steps:
  # Install pnpm and build n8n
  - name: "node:22.22.0"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        export NODE_OPTIONS="--max-old-space-size=4096"
        corepack enable pnpm
        pnpm install --frozen-lockfile
        pnpm build > build.log 2>&1
        node scripts/build-n8n.mjs

  # Build Docker image with reduced context
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "docker/images/n8n/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/n8n-custom:latest"
      - "--no-cache"
      - "."

images:
  - "gcr.io/$PROJECT_ID/n8n-custom:latest"

timeout: 3600s
options:
  machineType: "E2_HIGHCPU_8"
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY